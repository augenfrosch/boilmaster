[tracing.console]
enabled = false

[tracing.stdout]
enabled = true
format = "full"
filters.default = "debug"
filters.hyper = "info"

[http]
# address = "0.0.0.0"
port = 8080

[http.admin.auth]
username = "username"
password = "password"

[http.api1.asset]
maxage = 604800 # 1 week

[http.api1.search]
limit.default = 100
limit.max = 500
limit.depth = 2
fields.exdschema = "Name,Singular,Icon"
transient.exdschema = ""

[http.api1.sheet]
limit.default = 100
limit.max = 500
limit.depth = 2
list.fields.exdschema = "Name,Singular,Icon"
list.transient.exdschema = ""
entry.fields.exdschema = "*"
entry.transient.exdschema = "*"

[read.language]
default = "ko"
# This configuration is set up for the Korean game client, which does not seem to ship data for any other language.
exclude = ["ja", "en", "de", "fr", "chs", "cht"]

[version]
interval = 3600 # 1 hour
directory = "versions"
repositories = [
  "de199059", # ffxiv
  "573d8c07", # ex1 (hw)
  "ce34ddbd", # ex2 (stb)
  "b933ed2b", # ex3 (shb)
  "27577888", # ex4 (ew)
  "5050481e", # ex5 (dt)
]

[version.thaliak]
endpoint = "https://thaliak.xiv.dev/graphql/2022-08-14"

# Thaliak bugged out and failed to link between the last delta patch, and the history patches, at 7.0.
# This is just a manual specification of those links to restore the patch chain.
[version.thaliak.overrides]
de199059 = { "2024.11.02.0000.0000" = "H2024.11.02.0000.0000z" }
573d8c07 = { "2024.10.22.0002.0000" = "H2024.10.22.0002.0000c" }
ce34ddbd = { "2024.10.22.0003.0000" = "H2024.10.22.0003.0000e" }
b933ed2b = { "2024.11.02.0000.0000" = "H2024.11.02.0000.0000f" }
27577888 = { "2024.11.02.0000.0000" = "H2024.11.02.0000.0000g" }

[version.patch]
directory = "patches"
concurrency = 4
user_agent = "FFXIV PATCH CLIENT"

[schema]
default = "exdschema"
interval = 3600       # 1 hour

[schema.exdschema]
default = "2:ver:request"
remote = "https://github.com/xivdev/EXDSchema.git"
directory = "exdschema"

[search.sqlite]
directory = "search"

[search.sqlite.cursor]
ttl = 3600 # 1 hour
tti = 300  # 5 minutes
