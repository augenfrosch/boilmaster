[tracing.console]
enabled = false

[tracing.stdout]
enabled = true
format = "full"
filters.default = "debug"
filters.hyper = "info"

[http]
# address = "0.0.0.0"
port = 8080

[http.admin.auth]
username = "username"
password = "password"

[http.api1.asset]
maxage = 604800 # 1 week

[http.api1.search]
limit.default = 100
limit.max = 500
limit.depth = 2
fields.exdschema = "Name,Singular,Icon"
transient.exdschema = ""

[http.api1.sheet]
limit.default = 100
limit.max = 500
limit.depth = 2
list.fields.exdschema = "Name,Singular,Icon"
list.transient.exdschema = ""
entry.fields.exdschema = "*"
entry.transient.exdschema = "*"

[read.language]
default = "chs"
# This configuration is set up for the Chinese game client, which does not seem to ship data for any other language.
exclude = ["ja", "en", "de", "fr", "kr", "cht"]

[version]
interval = 3600 # 1 hour
directory = "versions"
repositories = [
  "c38effbc", # ffxiv
  "77420d17", # ex1 (hw)
  "ee4b5cad", # ex2 (stb)
  "994c6c3b", # ex3 (shb)
  "0728f998", # ex4 (ew)
  "702fc90e", # ex5 (dt)
]

[version.thaliak]
endpoint = "https://thaliak.xiv.dev/graphql/2022-08-14"

# Thaliak bugged out and failed to link between the last delta patch, and the history patches, at 7.0.
# This is just a manual specification of those links to restore the patch chain.
[version.thaliak.overrides]
c38effbc = { "2024.09.09.0000.0000" = "H2024.09.09.0000.0000z" }
77420d17 = { "2024.08.27.0002.0000" = "H2024.08.27.0002.0000c" }
ee4b5cad = { "2024.08.27.0003.0000" = "H2024.08.27.0003.0000e" }
994c6c3b = { "2024.09.09.0000.0000" = "H2024.09.09.0000.0000f" }
0728f998 = { "2024.09.09.0000.0000" = "H2024.09.09.0000.0000g" }

[version.patch]
directory = "patches"
concurrency = 4
user_agent = "FFXIV PATCH CLIENT"

[schema]
default = "exdschema"
interval = 3600       # 1 hour

[schema.exdschema]
default = "2:ver:request"
remote = "https://github.com/xivdev/EXDSchema.git"
directory = "exdschema"

[search.sqlite]
directory = "search"

[search.sqlite.cursor]
ttl = 3600 # 1 hour
tti = 300  # 5 minutes
